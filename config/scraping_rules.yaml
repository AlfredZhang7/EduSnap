# 通用列表页规则（兜底）
"generic_list_rule":
  article_list_css: "article, .card, .news-item, .post, .teaser, .views-row"
  title_css: "h2 a, h3 a, .title a"
  link_css: "a"
  date_css: "time, .date, .meta, .published, .news-date"

# ── 可用站点规则 ──

# 剑桥大学
"cam.ac.uk":
  base_url: "https://www.cam.ac.uk"
  news_index: "/latest-news"
  article_list_css: "article.clearfix.cam-horizontal-teaser"
  title_css: "h3 a"
  link_css: "h3 a"
  date_css: "time"
  date_format: "%d %B %Y"

